spring.application.name=neusoft_project

# Server Configuration
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/neusoft_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=hakro123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus Configuration
mybatis-plus.type-aliases-package=com.neusoft.neusoft_project.entity
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
logging.level.com.neusoft.neusoft_project.mapper=debug
mybatis-plus.configuration.map-underscore-to-camel-case=true

# ==========================================
# File Upload / Large JSON Configuration
# ==========================================

# 1. Standard Spring Boot Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 2. Tomcat Server Limits
# 'max-http-post-size' is deprecated. Use 'max-http-form-post-size' instead.
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB

# ==========================================
# AI Service Configuration (Ollama)
# ==========================================
spring.ai.ollama.base-url=http://localhost:11434

# Chat Model (The "Talker" - requires: ollama pull mistral)
spring.ai.ollama.chat.model=mistral

# Embedding Model (The "Reader" - requires: ollama pull mxbai-embed-large)
spring.ai.ollama.embedding.model=mxbai-embed-large

# Timeouts (Crucial for large PDFs to prevent "Error Connecting")
spring.ai.ollama.chat.options.timeout=60s
spring.ai.ollama.embedding.options.timeout=60s
spring.ai.ollama.connection-timeout=60s